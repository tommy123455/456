<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpellPicture - 英文生字復習</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232D5A4A'/><text x='50' y='68' font-family='Arial' font-size='50' font-weight='bold' text-anchor='middle' fill='%23FFD93D'>S</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #2D5A4A;
      --primary-light: #3D7A64;
      --secondary: #8B6914;
      --accent: #FFD93D;
      --accent-dark: #E6C235;
      --success: #4CAF50;
      --error: #E57373;
      --background: #1A1A2E;
      --background-light: #252542;
      --text-primary: #FFFFFF;
      --text-secondary: #B8C5D6;
      --shadow: rgba(0, 0, 0, 0.3);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--background-light); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    ::selection { background: var(--accent); color: var(--background); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-10px); } 80% { transform: translateX(10px); } }
    @keyframes starBurst { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 50% { transform: scale(1.5) rotate(180deg); opacity: 1; } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes scoreFly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) rotate(720deg); opacity: 0; } }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }
    .main-content { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; padding: 24px 0; }

    .bg-decoration { position: fixed; pointer-events: none; z-index: 0; }
    .bg-circle { border-radius: 50%; opacity: 0.05; background: var(--accent); }
    .bg-circle-1 { width: 300px; height: 300px; top: -100px; right: -100px; }
    .bg-circle-2 { width: 200px; height: 200px; bottom: 10%; left: -50px; }
    .bg-circle-3 { width: 150px; height: 150px; top: 40%; right: 5%; }

    .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 0 24px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 600;
      border: none; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s ease;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: var(--background); box-shadow: 0 4px 12px rgba(255, 217, 61, 0.3); }
    .btn-primary:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 217, 61, 0.4); }
    .btn-secondary { background: transparent; color: var(--text-primary); border: 2px solid var(--text-secondary); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--error); color: white; }

    .card { background: var(--background-light); border-radius: var(--radius-lg); padding: 24px; box-shadow: 0 8px 32px var(--shadow); }

    .progress-bar { width: 100%; height: 8px; background: var(--background-light); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; transition: width 0.3s ease; }

    .keyboard { display: flex; flex-direction: column; gap: 8px; padding: 16px; background: var(--background-light); border-radius: var(--radius-lg); }
    .keyboard-row { display: flex; justify-content: center; gap: 6px; }
    .key { min-width: 40px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--primary); color: var(--text-primary); font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s ease; user-select: none; }
    .key:hover { background: var(--primary-light); transform: translateY(-2px); }
    .key:active { transform: translateY(0); background: var(--accent); color: var(--background); }
    .key-wide { min-width: 70px; font-size: 14px; }

    .letter-box { width: 48px; height: 56px; display: flex; align-items: center; justify-content: center; background: var(--background-light); border: 2px solid var(--primary); border-radius: var(--radius-sm); font-family: 'Patrick Hand', cursive; font-size: 32px; color: var(--text-primary); transition: all 0.2s ease; }
    .letter-box.filled { border-color: var(--accent); background: rgba(255, 217, 61, 0.1); }
    .letter-box.correct { border-color: var(--success); background: rgba(76, 175, 80, 0.2); }
    .letter-box.wrong { border-color: var(--error); background: rgba(229, 115, 115, 0.2); }

    .image-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 8px 32px var(--shadow); }
    .image-container img { width: 100%; height: auto; display: block; }
    .image-loading { width: 100%; aspect-ratio: 4/3; background: linear-gradient(90deg, var(--background-light) 25%, var(--primary) 50%, var(--background-light) 75%); background-size: 200% 100%; animation: pulse 1.5s infinite; }
    .score-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Fredoka One', cursive; font-size: 48px; color: var(--accent); text-shadow: 2px 2px 4px var(--shadow); pointer-events: none; animation: scoreFly 0.8s ease-out forwards; }
    .star { position: absolute; width: 20px; height: 20px; background: var(--accent); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: starBurst 0.6s ease-out forwards; }

    /* Welcome Screen */
    .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; animation: fadeIn 0.5s ease-out; }
    .welcome-logo { font-size: 72px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    .welcome-title { font-family: 'Fredoka One', cursive; font-size: 56px; color: var(--accent); margin-bottom: 8px; text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.3); }
    .welcome-subtitle { font-size: 20px; color: var(--text-secondary); margin-bottom: 40px; max-width: 400px; }
    .welcome-description { display: flex; gap: 24px; margin-bottom: 48px; flex-wrap: wrap; justify-content: center; }
    .welcome-feature { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 24px; background: var(--background-light); border-radius: var(--radius-lg); min-width: 140px; }
    .welcome-feature-icon { font-size: 32px; }
    .welcome-feature-text { font-size: 14px; color: var(--text-secondary); }
    .start-button { padding: 16px 48px; font-size: 20px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: var(--background); border: none; border-radius: var(--radius-xl); cursor: pointer; font-family: 'Fredoka One', cursive; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(255, 217, 61, 0.4); }
    .start-button:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 12px 32px rgba(255, 217, 61, 0.5); }
    .total-score { margin-top: 32px; padding: 12px 24px; background: var(--background-light); border-radius: var(--radius-lg); display: flex; align-items: center; gap: 8px; font-size: 16px; color: var(--text-secondary); }
    .total-score span { color: var(--accent); font-family: 'Fredoka One', cursive; font-size: 24px; }

    /* Mode Selection Screen */
    .mode-screen { flex: 1; display: flex; flex-direction: column; padding: 24px; animation: fadeIn 0.4s ease-out; }
    .mode-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .mode-title { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--accent); }
    .back-button { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: transparent; border: 2px solid var(--text-secondary); color: var(--text-primary); border-radius: var(--radius-md); cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 14px; transition: all 0.2s ease; }
    .back-button:hover { border-color: var(--accent); color: var(--accent); }
    .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; max-width: 900px; margin: 0 auto; }
    .mode-card { position: relative; padding: 32px 24px; background: var(--background-light); border-radius: var(--radius-xl); cursor: pointer; transition: all 0.3s ease; border: 3px solid transparent; overflow: hidden; }
    .mode-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.1; background: var(--card-color, var(--accent)); }
    .mode-card:hover { transform: translateY(-8px); border-color: var(--card-color, var(--accent)); box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4); }
    .mode-icon { font-size: 64px; margin-bottom: 16px; }
    .mode-name { font-family: 'Fredoka One', cursive; font-size: 28px; margin-bottom: 8px; color: var(--card-color, var(--accent)); }
    .mode-desc { font-size: 16px; color: var(--text-secondary); line-height: 1.5; }
    .mode-badge { position: absolute; top: 16px; right: 16px; padding: 4px 12px; background: var(--card-color, var(--accent)); color: var(--background); font-size: 12px; font-weight: bold; border-radius: 20px; }

    /* Topic Screen */
    .topic-screen { padding: 24px; animation: fadeIn 0.4s ease-out; }
    .topic-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .topic-title { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--accent); }
    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
    .topic-card { position: relative; padding: 24px; background: var(--background-light); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; overflow: hidden; }
    .topic-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--card-color, var(--accent)); }
    .topic-card:hover { transform: translateY(-4px); border-color: var(--card-color, var(--accent)); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3); }
    .topic-emoji { font-size: 48px; margin-bottom: 12px; }
    .topic-name { font-family: 'Fredoka One', cursive; font-size: 24px; margin-bottom: 8px; }
    .topic-meta { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: var(--text-secondary); }
    .topic-difficulty { color: var(--accent); }
    .topic-words { display: flex; align-items: center; gap: 4px; }

    /* Game Screen */
    .game-screen { display: flex; flex-direction: column; min-height: calc(100vh - 48px); animation: fadeIn 0.4s ease-out; }
    .game-header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .game-score { display: flex; align-items: center; gap: 8px; font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--accent); }
    .game-progress { display: flex; align-items: center; gap: 16px; }
    .game-progress-text { font-size: 16px; color: var(--text-secondary); }
    .game-controls { display: flex; gap: 8px; }
    .control-button { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: var(--background-light); border: none; border-radius: var(--radius-md); color: var(--text-primary); cursor: pointer; transition: all 0.2s ease; }
    .control-button:hover { background: var(--primary); }
    .control-button.muted { color: var(--error); }
    .game-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 24px; gap: 24px; }
    .game-image-section { width: 100%; max-width: 450px; animation: slideUp 0.4s ease-out; }
    .game-image-container { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: var(--radius-xl); overflow: hidden; box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4); }
.game-image-container img { width: 100%; height: 100%; object-fit: contain; }
    .hint-bar { display: flex; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .hint-button { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--background-light); border: 1px solid var(--primary); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px; cursor: pointer; transition: all 0.2s ease; }
    .hint-button:hover:not(:disabled) { background: var(--primary); }
    .hint-button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint-cost { font-size: 12px; color: var(--error); }
    .word-hints { width: 100%; max-width: 500px; margin-top: 8px; text-align: center; }
    .hint-display { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .hint-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .hint-value { font-family: 'Patrick Hand', cursive; font-size: 24px; color: var(--accent); }
    .letter-count { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .letter-slot { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: var(--background-light); border: 1px dashed var(--primary); border-radius: 4px; font-size: 14px; color: var(--text-secondary); }
    .first-letter { color: var(--accent); font-weight: bold; border-style: solid; }
    .speaker-button { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: var(--primary); border: none; border-radius: 50%; color: var(--text-primary); cursor: pointer; transition: all 0.2s ease; }
    .speaker-button:hover { background: var(--primary-light); transform: scale(1.1); }
    .input-section { width: 100%; max-width: 600px; animation: slideUp 0.5s ease-out; }
    .letter-input-display { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; min-height: 64px; }
    .submit-section { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .feedback-section { min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 16px; }
    .feedback-correct { color: var(--success); }
    .feedback-wrong { color: var(--error); }
    .feedback-correct .feedback-icon { font-size: 48px; animation: bounce 0.5s ease; }
    .feedback-wrong .feedback-icon { font-size: 48px; animation: shake 0.5s ease; }
    .feedback-message { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .feedback-answer { font-family: 'Patrick Hand', cursive; font-size: 28px; margin-bottom: 16px; }
    .feedback-actions { display: flex; gap: 12px; }
    .keyboard-container { width: 100%; max-width: 700px; margin: 0 auto; animation: slideUp 0.6s ease-out; }

    /* Picture Selection Mode */
    .word-display { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; }
    .word-text { font-family: 'Fredoka One', cursive; font-size: 48px; color: var(--accent); text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.3); }
    .word-pronunciation { font-size: 18px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .picture-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; max-width: 500px; margin: 0 auto; }
    .picture-option { position: relative; aspect-ratio: 1; border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.3s ease; border: 3px solid transparent; }
    .picture-option:hover { transform: scale(1.05); border-color: var(--accent); }
    .picture-option.correct { border-color: var(--success); background: rgba(76, 175, 80, 0.3); }
    .picture-option.wrong { border-color: var(--error); background: rgba(229, 115, 115, 0.3); }
    .picture-option img { width: 100%; height: 100%; object-fit: cover; }

    /* Chinese Mode */
    .chinese-prompt { text-align: center; margin-bottom: 16px; }
    .chinese-text { font-size: 36px; font-weight: bold; color: var(--accent); margin-bottom: 8px; }
    .chinese-hint { font-size: 14px; color: var(--text-secondary); }

    /* Results Screen */
    .results-screen { padding: 24px; animation: fadeIn 0.4s ease-out; }
    .results-header { text-align: center; margin-bottom: 40px; }
    .results-title { font-family: 'Fredoka One', cursive; font-size: 40px; color: var(--accent); margin-bottom: 8px; }
    .results-subtitle { font-size: 18px; color: var(--text-secondary); }
    .results-card { max-width: 500px; margin: 0 auto 32px; text-align: center; }
    .results-score { font-family: 'Fredoka One', cursive; font-size: 72px; color: var(--accent); margin-bottom: 8px; animation: bounce 0.5s ease; }
    .results-score-label { font-size: 18px; color: var(--text-secondary); margin-bottom: 24px; }
    .results-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--text-primary); display: flex; align-items: center; gap: 4px; }
    .stat-value.success { color: var(--success); }
    .stat-value.error { color: var(--error); }
    .stat-label { font-size: 14px; color: var(--text-secondary); }
    .results-actions { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .wrong-words-section { max-width: 600px; margin: 0 auto 32px; }
    .wrong-words-title { font-size: 20px; color: var(--text-secondary); margin-bottom: 16px; text-align: center; }
    .wrong-words-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .wrong-word-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--background-light); border-radius: var(--radius-md); border-left: 4px solid var(--error); }
    .wrong-word-text { font-family: 'Patrick Hand', cursive; font-size: 20px; color: var(--text-primary); }

    /* Responsive */
    @media (max-width: 768px) {
      .welcome-title { font-size: 40px; }
      .welcome-description { gap: 12px; }
      .welcome-feature { padding: 12px 16px; min-width: 100px; }
      .topic-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .topic-emoji { font-size: 36px; }
      .topic-name { font-size: 20px; }
      .game-header { flex-direction: column; }
      .game-score { font-size: 20px; }
      .results-stats { gap: 16px; }
      .stat-value { font-size: 24px; }
      .key { min-width: 32px; height: 44px; font-size: 16px; }
      .key-wide { min-width: 56px; font-size: 12px; }
      .letter-box { width: 40px; height: 48px; font-size: 24px; }
      .picture-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .word-text { font-size: 36px; }
      .chinese-text { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, createContext, useContext, useReducer } = React;

    // ========== Data ==========
    const topics = [

      {

    // ========== Speech Hook ==========
    const useSpeech = () => {
      const speak = useCallback((text, options = {}) => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = options.rate || 0.9;
        const voices = window.speechSynthesis.getVoices();
        const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
        if (englishVoice) utterance.voice = englishVoice;
        window.speechSynthesis.speak(utterance);
      }, []);

      return {
        speakWord: (word) => speak(word, { rate: 0.8 }),
        speakCorrect: () => speak('Great job!', { rate: 1 }),
        speakWrong: (word) => speak(`The correct spelling is ${word.split('').join(' ')}, ${word}`, { rate: 0.8 }),
      };
    };

    // ========== Game Context ==========
    const GameContext = createContext();

    const gameModes = [
      { id: 'spell', name: '看圖拼寫', icon: '✏️', desc: '看圖片，拼出正確的英文單字', badge: '經典', color: '#FF6B6B' },
      { id: 'picture', name: '看詞找圖', icon: '🖼️', desc: '看英文單字，選擇正確的圖片', badge: '新功能', color: '#4ECDC4' },
      { id: 'chinese', name: '看中文拼寫', icon: '🔤', desc: '看中文，寫出對應的英文', badge: '新功能', color: '#FFE66D' },

    const initialState = {
      screen: 'welcome',
      gameMode: 'spell',
      currentTopic: null,
      currentWordIndex: 0,
      score: 0,
      combo: 0,
      answers: [],
      currentInput: '',
      feedback: null,
      hintsUsed: 0,
      wordStartTime: null,
      isMuted: false,
      showHint1: false,
      showHint2: false,
      showHint3: false,
      totalScore: 0,
      history: [],
      selectedPicture: null,
      pictureOptions: [],
    };

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function getPictureOptions(currentWord, allTopics, count = 4) {
      const allWords = allTopics.flatMap(t => t.words);
      const otherWords = allWords.filter(w => w.id !== currentWord.id);
      const shuffled = shuffleArray(otherWords);
      const wrongOptions = shuffled.slice(0, count - 1);
      const allOptions = shuffleArray([currentWord, ...wrongOptions]);
      return allOptions;
    }

    function gameReducer(state, action) {
      switch (action.type) {
        case 'SELECT_MODE':
          return { ...state, gameMode: action.payload, screen: 'topics' };
        case 'START_GAME': {
          const currentWord = action.payload.words[0];
          const pictureOptions = state.gameMode === 'picture' 
            ? getPictureOptions(currentWord, topics) 
            : [];
          return {
            ...state,
            screen: 'game',
            currentTopic: action.payload,
            currentWordIndex: 0,
            score: 0,
            combo: 0,
            answers: [],
            currentInput: '',
            feedback: null,
            hintsUsed: 0,
            wordStartTime: Date.now(),
            showHint1: false,
            showHint2: false,
            showHint3: false,
            selectedPicture: null,
            pictureOptions,
          };
        }
        case 'INPUT_LETTER':
          return { ...state, currentInput: state.currentInput + action.payload.toUpperCase() };
        case 'DELETE_LETTER':
          return { ...state, currentInput: state.currentInput.slice(0, -1) };
        case 'SELECT_PICTURE': {
          const { wordId } = action.payload;
          const currentWord = state.currentTopic.words[state.currentWordIndex];
          const correct = wordId === currentWord.id;
          const timeBonus = (Date.now() - state.wordStartTime) < 30000 ? 5 : 0;
          const comboBonus = correct ? Math.min(state.combo * 2, 10) : 0;
          let newScore = state.score;
          if (correct) newScore = state.score + 10 + timeBonus + comboBonus;
          return {
            ...state,
            score: Math.max(0, newScore),
            combo: correct ? state.combo + 1 : 0,
            selectedPicture: wordId,
            answers: [...state.answers, {
              wordId: currentWord.id,
              word: currentWord.text,
              correct,
              correctAnswer: currentWord.text,
            }],
            feedback: {
              type: correct ? 'correct' : 'wrong',
              message: correct ? `太棒了！+${10 + timeBonus + comboBonus}分` : `正確答案是 ${currentWord.text}`,
              score: correct ? 10 + timeBonus + comboBonus : 0,
            },
          };
        }
        case 'SUBMIT_ANSWER': {
          const { correct, correctAnswer } = action.payload;
          const currentWord = state.currentTopic.words[state.currentWordIndex];
          const timeBonus = (Date.now() - state.wordStartTime) < 30000 ? 5 : 0;
          const comboBonus = correct ? Math.min(state.combo * 2, 10) : 0;
          const hintPenalty = (state.showHint2 ? 2 : 0) + (state.showHint3 ? 1 : 0);
          let newScore = state.score;
          if (correct) newScore = state.score + 10 + timeBonus + comboBonus - hintPenalty;
          return {
            ...state,
            score: Math.max(0, newScore),
            combo: correct ? state.combo + 1 : 0,
            answers: [...state.answers, {
              wordId: currentWord.id,
              word: currentWord.text,
              correct,
              hintsUsed: state.hintsUsed,
              correctAnswer,
            }],
            feedback: {
              type: correct ? 'correct' : 'wrong',
              message: correct ? `太棒了！+${10 + timeBonus + comboBonus - hintPenalty}分` : `正確答案是 ${correctAnswer}`,
              score: correct ? 10 + timeBonus + comboBonus - hintPenalty : 0,
            },
          };
        }
        case 'NEXT_WORD': {
          const nextIndex = state.currentWordIndex + 1;
          if (nextIndex >= state.currentTopic.words.length) {
            const newHistory = [...state.history, {
              topicId: state.currentTopic.id,
              topicName: state.currentTopic.name,
              gameMode: state.gameMode,
              score: state.score,
              correctCount: state.answers.filter(a => a.correct).length,
              totalCount: state.currentTopic.words.length,
              date: new Date().toISOString(),
            }].slice(-10);
            const newTotalScore = state.totalScore + state.score;
            localStorage.setItem('spellpicture_history', JSON.stringify(newHistory));
            localStorage.setItem('spellpicture_totalScore', newTotalScore.toString());
            return { ...state, screen: 'results', history: newHistory, totalScore: newTotalScore };
          }
          const nextWord = state.currentTopic.words[nextIndex];
          const pictureOptions = state.gameMode === 'picture' 
            ? getPictureOptions(nextWord, topics) 
            : [];
          return {
            ...state,
            currentWordIndex: nextIndex,
            currentInput: '',
            feedback: null,
            hintsUsed: 0,
            wordStartTime: Date.now(),
            showHint1: false,
            showHint2: false,
            showHint3: false,
            selectedPicture: null,
            pictureOptions,
          };
        }
        case 'USE_HINT':
          if (action.payload === 1) return { ...state, showHint1: true, hintsUsed: state.hintsUsed + 1 };
          if (action.payload === 2) return { ...state, showHint2: true, hintsUsed: state.hintsUsed + 1 };
          if (action.payload === 3) return { ...state, showHint3: true, hintsUsed: state.hintsUsed + 1 };
          return state;
        case 'TOGGLE_MUTE':
          return { ...state, isMuted: !state.isMuted };
        case 'SET_SCREEN':
          return { ...state, screen: action.payload };
        case 'RESET_GAME':
          return { ...initialState, totalScore: state.totalScore, history: state.history, isMuted: state.isMuted, gameMode: state.gameMode };
        case 'LOAD_SAVED_DATA':
          return { ...state, totalScore: action.payload.totalScore || 0, history: action.payload.history || [] };
        default:
          return state;
      }
    }

    function GameProvider({ children }) {
      const [state, dispatch] = useReducer(gameReducer, initialState);
      useEffect(() => {
        const savedHistory = localStorage.getItem('spellpicture_history');
        const savedTotalScore = localStorage.getItem('spellpicture_totalScore');
        if (savedHistory || savedTotalScore) {
          dispatch({
            type: 'LOAD_SAVED_DATA',
            payload: {
              history: savedHistory ? JSON.parse(savedHistory) : [],
              totalScore: savedTotalScore ? parseInt(savedTotalScore, 10) : 0,
            },
          });
        }
      }, []);
      return <GameContext.Provider value={{ state, dispatch }}>{children}</GameContext.Provider>;
    }

    const useGame = () => useContext(GameContext);

        sparkles: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
      };
      return <span style={{ display: 'flex', alignItems: 'center' }}>{icons[name]}</span>;
    };

    // ========== Stars Explosion ==========
    function StarsExplosion() {
      const [stars, setStars] = useState([]);
      useEffect(() => {
        const newStars = [];
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          const distance = 60 + Math.random() * 40;
          newStars.push({
            id: i,
            x: Math.cos(angle) * distance,
            y: Math.sin(angle) * distance,
            delay: Math.random() * 0.2,
            size: 10 + Math.random() * 10,
          });
        }
        setStars(newStars);
      }, []);
      return (
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)' }}>
          {stars.map((star) => (
            <div
              key={star.id}
              style={{
                position: 'absolute',
                width: star.size,
                height: star.size,
                left: `calc(50% + ${star.x}px)`,
                top: `calc(50% + ${star.y}px)`,
                background: ['#FFD93D', '#4CAF50', '#FF6B6B', '#4ECDC4'][star.id % 4],
                clipPath: 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)',
                animation: `starBurst 0.6s ease-out ${star.delay}s forwards`,
              }}
            />
          ))}
        </div>
      );
    }

    // ========== Game Screen ==========
    function GameScreen() {
      const { state, dispatch } = useGame();
      const { speakWord, speakCorrect, speakWrong } = useSpeech();
      const [imageLoaded, setImageLoaded] = useState(false);
      const [showScorePopup, setShowScorePopup] = useState(false);
      const [shake, setShake] = useState(false);

      const { gameMode, currentTopic, currentWordIndex, currentInput, feedback, showHint1, showHint2, showHint3, score, isMuted, selectedPicture, pictureOptions } = state;
      const currentWord = currentTopic.words[currentWordIndex];
      const progress = (currentWordIndex / currentTopic.words.length) * 100;
      const inputLength = currentInput.length;
      const wordLength = currentWord.text.length;

      useEffect(() => { setImageLoaded(false); }, [currentWordIndex]);
      useEffect(() => {
        if (feedback?.type === 'correct') {
          const timer = setTimeout(() => dispatch({ type: 'NEXT_WORD' }), 1500);
          return () => clearTimeout(timer);
        }
      }, [feedback, dispatch]);

      const handleKeyPress = useCallback((letter) => {
        if (feedback?.type === 'correct') return;
        if (inputLength < wordLength) dispatch({ type: 'INPUT_LETTER', payload: letter });
      }, [dispatch, feedback, inputLength, wordLength]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (feedback?.type === 'correct') return;
          if (gameMode === 'chinese' || gameMode === 'spell') {
            const key = e.key.toUpperCase();
            if (/^[A-Z]$/.test(key)) handleKeyPress(key);
            else if (e.key === 'Backspace') dispatch({ type: 'DELETE_LETTER' });
            else if (e.key === 'Enter' && inputLength === wordLength) handleSubmit();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleKeyPress, inputLength, wordLength, feedback, gameMode]);

      const handleSubmit = () => {
        if (inputLength !== wordLength) return;
        const correct = currentInput.toUpperCase() === currentWord.text;
        if (correct) {
          if (!isMuted) speakCorrect();
          setShowScorePopup(true);
          setTimeout(() => setShowScorePopup(false), 800);
        } else {
          if (!isMuted) speakWrong(currentWord.text);
          setShake(true);
          setTimeout(() => setShake(false), 500);
        }
        dispatch({ type: 'SUBMIT_ANSWER', payload: { correct, correctAnswer: currentWord.text } });
      };

      const handlePictureSelect = (word) => {
        if (feedback?.type === 'correct') return;
        if (!isMuted) {
          if (word.id === currentWord.id) {
            speakCorrect();
          } else {
            speakWrong(currentWord.text);
          }
        }
        setShake(word.id !== currentWord.id);
        setTimeout(() => setShake(false), 500);
        dispatch({ type: 'SELECT_PICTURE', payload: { wordId: word.id } });
      };

      const handleNextWord = () => dispatch({ type: 'NEXT_WORD' });
      const handleHint1 = () => dispatch({ type: 'USE_HINT', payload: 1 });
      const handleHint2 = () => { if (!showHint2) dispatch({ type: 'USE_HINT', payload: 2 }); };
      const handleHint3 = () => { if (!showHint3) { dispatch({ type: 'USE_HINT', payload: 3 }); if (!isMuted) speakWord(currentWord.text); } };
      const handlePlaySound = () => { if (!isMuted) speakWord(currentWord.text); };
      const handleToggleMute = () => dispatch({ type: 'TOGGLE_MUTE' });
      const handleBack = () => dispatch({ type: 'RESET_GAME' });

      const renderLetterBoxes = () => {
        const boxes = [];
        for (let i = 0; i < wordLength; i++) {
          const letter = currentInput[i] || '';
          const isFilled = i < inputLength;
          let className = 'letter-box';
          if (isFilled) className += ' filled';
          if (feedback?.type === 'correct') className += ' correct';
          if (feedback?.type === 'wrong' && isFilled) className += ' wrong';
          boxes.push(<div key={i} className={className}>{letter || '_'}</div>);
        }
        return boxes;
      };

      // 看圖拼寫模式 (Spell Mode)
      const renderSpellMode = () => (
        <>
          <div className="game-image-section" style={{ animation: shake ? 'shake 0.5s ease' : '' }}>
            <div className="game-image-container">
              {!imageLoaded && <div className="image-loading" />}
              <img
                src={currentWord.image}
                alt="題目圖片"
                style={{ display: imageLoaded ? 'block' : 'none' }}
                onLoad={() => setImageLoaded(true)}
              />
              {showScorePopup && <div className="score-popup">+{feedback?.score}</div>}
              {feedback?.type === 'correct' && <StarsExplosion />}
            </div>

            <div className="hint-bar">
              <button className="hint-button" onClick={handleHint1} title="顯示字母數量">
                <Icon name="eye" size={16} /> 字母數量
              </button>
              <button className="hint-button" onClick={handleHint2} disabled={showHint2} title="顯示第一個字母 (-2分)">
                <Icon name="help" size={16} /> 第一個字母 {!showHint2 && <span className="hint-cost">-2</span>}
              </button>
              <button className="hint-button" onClick={handleHint3} disabled={showHint3} title="朗讀單字 (-1分)">
                <Icon name="volume" size={16} /> 聽發音 {!showHint3 && <span className="hint-cost">-1</span>}
              </button>
            </div>

            <div className="word-hints">
              {showHint1 && (
                <div className="hint-display">
                  <div>
                    <div className="hint-label">字母數量</div>
                    <div className="hint-value">{wordLength} 個字母</div>
                  </div>
                </div>
              )}
              {showHint1 && (
                <div className="letter-count">
                  {Array.from(currentWord.text).map((letter, i) => (
                    <div key={i} className={`letter-slot ${showHint2 && i === 0 ? 'first-letter' : ''}`}>
                      {showHint2 && i === 0 ? letter : '?'}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </>
      );

      // 看詞找圖模式 (Picture Mode)
      const renderPictureMode = () => (
        <div className="game-image-section" style={{ animation: shake ? 'shake 0.5s ease' : '' }}>
          <div className="word-display">
            <div className="word-text">{currentWord.text}</div>
            <div className="word-pronunciation">
              <button className="speaker-button" onClick={handlePlaySound}>
                <Icon name="volume" size={24} />
              </button>
              <span>點擊喇叭聽發音</span>
            </div>
          </div>

          <div className="picture-grid">
            {pictureOptions.map((word) => {
              let className = 'picture-option';
              if (feedback) {
                if (word.id === currentWord.id) className += ' correct';
                else if (word.id === selectedPicture) className += ' wrong';
              }
              return (
                <div
                  key={word.id}
                  className={className}
                  onClick={() => handlePictureSelect(word)}
                  style={{ animation: `popIn 0.3s ease-out ${pictureOptions.indexOf(word) * 0.1}s both` }}
                >
                  <img src={word.image} alt="選項圖片" />
                </div>
              );
            })}
          </div>
        </div>
      );

      // 看中文拼寫模式 (Chinese Mode)
      const renderChineseMode = () => (
        <>
          <div className="game-image-section" style={{ animation: shake ? 'shake 0.5s ease' : '' }}>
            <div className="game-image-container">
              {!imageLoaded && <div className="image-loading" />}
              <img
                src={currentWord.image}
                alt="題目圖片"
                style={{ display: imageLoaded ? 'block' : 'none' }}
                onLoad={() => setImageLoaded(true)}
              />
              {showScorePopup && <div className="score-popup">+{feedback?.score}</div>}
              {feedback?.type === 'correct' && <StarsExplosion />}
            </div>

            <div className="chinese-prompt">
              <div className="chinese-text">{currentWord.chinese}</div>
              <div className="chinese-hint">請拼寫出這個物品的英文名稱</div>
            </div>

            <div className="hint-bar">
              <button className="hint-button" onClick={handleHint1} title="顯示字母數量">
                <Icon name="eye" size={16} /> 字母數量
              </button>
              <button className="hint-button" onClick={handleHint2} disabled={showHint2} title="顯示第一個字母 (-2分)">
                <Icon name="help" size={16} /> 第一個字母 {!showHint2 && <span className="hint-cost">-2</span>}
              </button>
              <button className="hint-button" onClick={handleHint3} disabled={showHint3} title="朗讀單字 (-1分)">
                <Icon name="volume" size={16} /> 聽發音 {!showHint3 && <span className="hint-cost">-1</span>}
              </button>
            </div>

            <div className="word-hints">
              {showHint1 && (
                <div className="hint-display">
                  <div>
                    <div className="hint-label">字母數量</div>
                    <div className="hint-value">{wordLength} 個字母</div>
                  </div>
                </div>
              )}
              {showHint1 && (
                <div className="letter-count">
                  {Array.from(currentWord.text).map((letter, i) => (
                    <div key={i} className={`letter-slot ${showHint2 && i === 0 ? 'first-letter' : ''}`}>
                      {showHint2 && i === 0 ? letter : '?'}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </>
      );

      return (
        <div className="game-screen">
          <div className="game-header">
            <div className="game-score">
              <Icon name="star" size={24} /> {score}
            </div>
            <div className="game-progress">
              <span className="game-progress-text">{currentWordIndex + 1} / {currentTopic.words.length}</span>
              <div className="progress-bar" style={{ width: '120px' }}>
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>
            <div className="game-controls">
              <button className={`control-button ${isMuted ? 'muted' : ''}`} onClick={handleToggleMute} title={isMuted ? '開啟音效' : '靜音'}>
                <Icon name={isMuted ? 'volumeOff' : 'volume'} size={20} />
              </button>
              <button className="control-button" onClick={handleBack} title="返回首頁">
                <Icon name="back" size={20} />
              </button>
            </div>
          </div>

          <div className="game-content">
            {gameMode === 'spell' && renderSpellMode()}
            {gameMode === 'picture' && renderPictureMode()}
            {gameMode === 'chinese' && renderChineseMode()}

            <div className="feedback-section">
              {feedback && (
                <div className={`feedback-${feedback.type}`}>
                  <div className="feedback-icon">{feedback.type === 'correct' ? '🎉' : '🤔'}</div>
                  <div className="feedback-message">{feedback.message}</div>
                  {feedback.type === 'wrong' && (
                    <>
                      <div className="feedback-answer">{currentWord.text}</div>
                      <div className="feedback-actions">
                        <button className="btn btn-primary" onClick={handleNextWord}>
                          <Icon name="chevronRight" size={16} /> 下一題
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>

            {!feedback && (gameMode === 'spell' || gameMode === 'chinese') && (
              <>
                <div className="input-section">
                  <div className="letter-input-display">{renderLetterBoxes()}</div>
                  <div className="submit-section">
                    <button className="btn btn-secondary" onClick={() => dispatch({ type: 'DELETE_LETTER' })}>刪除</button>
                    <button className="btn btn-primary" onClick={handleSubmit} disabled={inputLength !== wordLength}>送出答案</button>
                    <button className="btn btn-secondary" onClick={handlePlaySound}>
                      <Icon name="volume" size={16} /> 朗讀
                    </button>
                  </div>
                </div>

                <div className="keyboard-container">
                  <div className="keyboard">
                    {keyboardRows.map((row, rowIndex) => (
                      <div key={rowIndex} className="keyboard-row">
                        {row.map((key) => (
                          <button
                            key={key}
                            className={`key ${key === '⌫' ? 'key-wide' : ''}`}
                            onClick={() => key === '⌫' ? dispatch({ type: 'DELETE_LETTER' }) : handleKeyPress(key)}
                          >
                            {key}
                          </button>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ========== Results Screen ==========
    function ResultsScreen() {
      const { state, dispatch } = useGame();
      const { speakWord } = useSpeech();
      const { score, currentTopic, answers } = state;
      const correctCount = answers.filter(a => a.correct).length;
      const totalCount = answers.length;
      const accuracy = Math.round((correctCount / totalCount) * 100);
      const wrongAnswers = answers.filter(a => !a.correct);

      const handlePlayAgain = () => dispatch({ type: 'START_GAME', payload: currentTopic });
      const handleGoHome = () => { dispatch({ type: 'RESET_GAME' }); dispatch({ type: 'SET_SCREEN', payload: 'welcome' }); };
      const handleRetryWrong = () => {
        const wrongWords = wrongAnswers.map(w => currentTopic.words.find(tw => tw.id === w.wordId));
        if (wrongWords.length > 0) {
          const retryTopic = { ...currentTopic, id: 'retry', name: '錯字複習', words: wrongWords };
          dispatch({ type: 'START_GAME', payload: retryTopic });
        }
      };

      return (
        <div className="results-screen">
          <div className="results-header">
            <Icon name="trophy" size={64} />
            <h1 className="results-title">練習完成！</h1>
            <p className="results-subtitle">{currentTopic.name}主題練習結果</p>
          </div>

          <div className="results-card card animate-slide-up">
            <div className="results-score">{score}</div>
            <div className="results-score-label">總得分</div>
            <div className="results-stats">
              <div className="stat-item">
                <div className="stat-value success"><Icon name="check" size={20} />{correctCount}</div>
                <div className="stat-label">答對</div>
              </div>
              <div className="stat-item">
                <div className="stat-value error"><Icon name="x" size={20} />{wrongAnswers.length}</div>
                <div className="stat-label">答錯</div>
              </div>
              <div className="stat-item">
                <div className="stat-value">{accuracy}%</div>
                <div className="stat-label">正確率</div>
              </div>
            </div>
            <div className="results-actions">
              <button className="btn btn-primary" onClick={handlePlayAgain}>
                <Icon name="rotate" size={16} /> 再玩一次
              </button>
              <button className="btn btn-secondary" onClick={handleGoHome}>
                <Icon name="home" size={16} /> 返回首頁
              </button>
            </div>
          </div>

          {wrongAnswers.length > 0 && (
            <div className="wrong-words-section">
              <h3 className="wrong-words-title">錯字複習 ({wrongAnswers.length} 個)</h3>
              <div className="wrong-words-list">
                {wrongAnswers.map((item, index) => (
                  <div key={index} className="wrong-word-item">
                    <span className="wrong-word-text">{item.word}</span>
                    <button className="control-button" onClick={() => speakWord(item.word)} title="朗讀發音">
                      <Icon name="volume" size={14} />
                    </button>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 24, textAlign: 'center' }}>
                <button className="btn btn-success" onClick={handleRetryWrong}>
                  <Icon name="rotate" size={16} /> 針對錯字練習
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== App ==========
    function App() {
      const { state } = useGame();
      return (
        <div className="app">
          <div className="bg-decoration bg-circle bg-circle-1" />
          <div className="bg-decoration bg-circle bg-circle-2" />
          <div className="bg-decoration bg-circle bg-circle-3" />
          <main className="main-content">
            {state.screen === 'welcome' && <WelcomeScreen />}
            {state.screen === 'modes' && <ModeScreen />}
            {state.screen === 'topics' && <TopicScreen />}
            {state.screen === 'game' && <GameScreen />}
            {state.screen === 'results' && <ResultsScreen />}
          </main>
        </div>
      );
    }

    // ========== Render ==========
    function Root() {
      return (
        <GameProvider>
          <App />
        </GameProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
